name: Vercel Deploy

on:
  push:
    branches:
      - "**"

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: vercel-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Resolve deploy target
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
            echo "flag=--prod" >> "$GITHUB_OUTPUT"
            echo "label=Production" >> "$GITHUB_OUTPUT"
          else
            echo "env=preview" >> "$GITHUB_OUTPUT"
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "label=Preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync sponsor keys to Vercel env
        # Push the sponsor keys from GitHub Actions secrets onto the Vercel
        # project's env (production scope on main, preview scope otherwise)
        # before pulling. This is the only place that owns the Vercel env;
        # changing a key in GH Actions secrets makes it live on the next
        # deploy without anyone touching the Vercel dashboard.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NIA_API_KEY: ${{ secrets.NIA_API_KEY }}
          HYPERSPELL_API_KEY: ${{ secrets.HYPERSPELL_API_KEY }}
          INSFORGE_BASE_URL: ${{ secrets.INSFORGE_BASE_URL }}
          INSFORGE_ANON_KEY: ${{ secrets.INSFORGE_ANON_KEY }}
        run: |
          set -e
          SCOPE="${{ steps.target.outputs.env }}"
          for KEY in OPENAI_API_KEY NIA_API_KEY HYPERSPELL_API_KEY INSFORGE_BASE_URL INSFORGE_ANON_KEY; do
            VAL="${!KEY}"
            if [ -z "$VAL" ]; then
              echo "[skip] $KEY — no GH secret set"
              continue
            fi
            # Remove existing (tolerates missing) then add fresh.
            vercel env rm "$KEY" "$SCOPE" --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
            printf '%s' "$VAL" | vercel env add "$KEY" "$SCOPE" --token=${{ secrets.VERCEL_TOKEN }}
            echo "[set]  $KEY ($SCOPE)"
          done

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.target.outputs.env }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build ${{ steps.target.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ steps.target.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          {
            echo "## ${{ steps.target.outputs.label }} deploy"
            echo ""
            echo "- URL: $URL"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Branch: \`${{ github.ref_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
